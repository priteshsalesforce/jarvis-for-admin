<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis · Agentic ITSM Setup</title>
  <link rel="icon" type="image/png" href="assets/jarvis-mark.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem("jarvis-theme");
        if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <!-- Ambient background orb glow -->
  <div class="bg-orb bg-orb--a"></div>
  <div class="bg-orb bg-orb--b"></div>

  <!-- ======================================================================
       APP SHELL — left sidenav + main workspace.
       The sidenav is the only persistent global chrome (no topbar). It
       collapses to an icon rail and expands to show labels + chat sessions.
       ====================================================================== -->
  <div class="app-shell" id="appShell">

    <!-- =====================================================================
         SIDE NAV — Gemini-style.
         Sections, top → bottom:
           1. Hamburger (collapse / expand)
           2. Workspace items: Cockpit, Horizon, Incidents (gated until setup
              completes), Settings (active during setup)
           3. Divider
           4. New chat button
           5. Recent chat sessions (hidden when collapsed)
           6. Profile (pinned to the bottom)
         ===================================================================== -->
    <aside class="sidenav" id="sidenav"
           data-collapsed="false"
           role="navigation"
           aria-label="Primary navigation">

      <!-- Header: hamburger -->
      <div class="sidenav__head">
        <button class="sidenav__hamburger" id="navToggle" type="button"
                aria-label="Collapse sidebar" aria-expanded="true"
                aria-controls="sidenav">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="4" y1="6"  x2="20" y2="6"/>
            <line x1="4" y1="12" x2="20" y2="12"/>
            <line x1="4" y1="18" x2="20" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Workspace items.
           Cockpit / Horizon / Incidents start with `is-locked` which
           hides them until the IT admin completes Setup; the JS
           strips that class on `setup complete` and the items
           reveal in place. Settings is the only item visible during
           Setup, and it's marked active for the entire flow. -->
      <nav class="sidenav__group" aria-label="Workspace">
        <button class="sidenav__item is-locked"
                type="button" id="navCockpit" data-nav="cockpit"
                hidden>
          <span class="sidenav__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect width="7" height="9" x="3" y="3"  rx="1.5"/>
              <rect width="7" height="5" x="14" y="3"  rx="1.5"/>
              <rect width="7" height="9" x="14" y="12" rx="1.5"/>
              <rect width="7" height="5" x="3" y="16"  rx="1.5"/>
            </svg>
          </span>
          <span class="sidenav__label">Cockpit</span>
        </button>

        <button class="sidenav__item is-locked"
                type="button" id="navHorizon" data-nav="horizon"
                hidden>
          <span class="sidenav__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 14h18"/>
              <path d="M5 14a7 7 0 0 1 14 0"/>
              <path d="M2 18h20"/>
            </svg>
          </span>
          <span class="sidenav__label">Horizon</span>
        </button>

        <button class="sidenav__item is-locked"
                type="button" id="navIncidents" data-nav="incidents"
                hidden>
          <span class="sidenav__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 9v4"/>
              <path d="M12 17h.01"/>
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/>
            </svg>
          </span>
          <span class="sidenav__label">Incidents</span>
        </button>

        <button class="sidenav__item is-active"
                type="button" id="navSettings" data-nav="settings"
                aria-current="page">
          <span class="sidenav__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
          <span class="sidenav__label">Settings</span>
        </button>
      </nav>

      <!-- Divider -->
      <div class="sidenav__divider" role="separator" aria-hidden="true"></div>

      <!-- New chat -->
      <button class="sidenav__newchat" id="navNewChat" type="button"
              title="Start a new chat with Jarvis">
        <span class="sidenav__icon sidenav__icon--newchat" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"/>
          </svg>
        </span>
        <span class="sidenav__label">New chat</span>
      </button>

      <!-- Recent chat sessions (hidden when collapsed) -->
      <div class="sidenav__sessions" id="navSessions" aria-label="Recent chats">
        <div class="sidenav__sessions-title">Chats</div>
        <ul class="sidenav__sessions-list" id="navSessionList">
          <li class="sidenav__sessions-empty" id="navSessionsEmpty">
            No chats yet — ask Jarvis anything to start one.
          </li>
        </ul>
      </div>

      <!-- Profile, pinned to bottom -->
      <div class="sidenav__foot">
        <button class="sidenav__profile" id="navProfile" type="button"
                aria-label="Open your profile · Sarah Chen, IT Admin">
          <span class="sidenav__avatar" aria-hidden="true">S</span>
          <span class="sidenav__profile-meta">
            <span class="sidenav__profile-name">Sarah Chen</span>
            <span class="sidenav__profile-sub">IT Admin · Acme Health</span>
          </span>
        </button>
      </div>
    </aside>

    <!-- =====================================================================
         WORKSPACE — chat thread + side-panel browser.
         The setup chapter auto-runs on first paint (welcome hero → setup
         story). The whisper bar in the dock stays visible throughout so the
         IT admin can interrupt to ask Jarvis a question.
         ===================================================================== -->
    <main class="workspace" id="workspace">
      <section class="stage" id="stage">
        <div class="stage__main" id="stageMain">
          <div class="thread" id="thread"></div>
        </div>

        <div class="dock" id="dock">
          <div class="whisper" id="whisper">
            <div class="whisper__row whisper__row--input">
              <input class="whisper__input" id="whisperInput"
                     placeholder="Ask Jarvis anything…"
                     aria-label="Ask Jarvis a question" />
            </div>
            <div class="whisper__row whisper__row--actions">
              <div class="whisper__actions whisper__actions--left">
                <button class="whisper__icon" type="button" title="Add attachment" aria-label="Add attachment">
                  <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true">
                    <path d="M9.0769 8.80767H13.5192C13.7346 8.80767 13.9231 8.61921 13.9231 8.40383V7.59614C13.9231 7.38075 13.7346 7.19229 13.5192 7.19229H9.0769C8.91537 7.19229 8.80767 7.0846 8.80767 6.92306V2.48075C8.80767 2.26537 8.61921 2.0769 8.40383 2.0769H7.59614C7.38075 2.0769 7.19229 2.26537 7.19229 2.48075V6.92306C7.19229 7.0846 7.0846 7.19229 6.92306 7.19229H2.48075C2.26537 7.19229 2.0769 7.38075 2.0769 7.59614V8.40383C2.0769 8.61921 2.26537 8.80767 2.48075 8.80767H6.92306C7.0846 8.80767 7.19229 8.91537 7.19229 9.0769V13.5192C7.19229 13.7346 7.38075 13.9231 7.59614 13.9231H8.40383C8.61921 13.9231 8.80767 13.7346 8.80767 13.5192V9.0769C8.80767 8.91537 8.91537 8.80767 9.0769 8.80767Z"/>
                  </svg>
                </button>
              </div>
              <div class="whisper__actions whisper__actions--right">
                <button class="whisper__icon whisper__mic" type="button" title="Voice input" aria-label="Voice input">
                  <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true">
                    <path d="M11.9899 5.90001C11.8228 5.90001 11.6626 5.96639 11.5444 6.08454C11.4263 6.20268 11.3599 6.36293 11.3599 6.53001V7.58001C11.3599 9.42801 9.84788 10.94 7.99988 10.94C6.15188 10.94 4.63988 9.42801 4.63988 7.58001V6.53001C4.63988 6.17301 4.36688 5.90001 4.00988 5.90001C3.65288 5.90001 3.37988 6.17301 3.37988 6.53001V7.58001C3.3796 8.69638 3.78356 9.77508 4.51705 10.6167C5.25054 11.4583 6.26395 12.0058 7.36988 12.158V13.04H6.31988C5.96288 13.04 5.68988 13.313 5.68988 13.67C5.68988 14.027 5.96288 14.3 6.31988 14.3H9.67988C10.0369 14.3 10.3099 14.027 10.3099 13.67C10.3099 13.313 10.0369 13.04 9.67988 13.04H8.62988V12.158C9.73582 12.0058 10.7492 11.4583 11.4827 10.6167C12.2162 9.77508 12.6202 8.69638 12.6199 7.58001V6.53001C12.6199 6.36293 12.5535 6.20268 12.4354 6.08454C12.3172 5.96639 12.157 5.90001 11.9899 5.90001ZM7.99988 9.68001C8.55684 9.68001 9.09098 9.45876 9.48481 9.06494C9.87863 8.67111 10.0999 8.13697 10.0999 7.58001V3.77901C10.0999 3.22763 9.88085 2.69883 9.49096 2.30894C9.10107 1.91905 8.57227 1.70001 8.02088 1.70001H7.97888C7.4275 1.70001 6.8987 1.91905 6.50881 2.30894C6.11892 2.69883 5.89988 3.22763 5.89988 3.77901V7.58001C5.89988 8.13697 6.12113 8.67111 6.51496 9.06494C6.90879 9.45876 7.44293 9.68001 7.99988 9.68001Z"/>
                  </svg>
                </button>
                <button class="whisper__send" id="whisperSend" type="button" title="Send" aria-label="Send">
                  <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true">
                    <path fill-rule="evenodd" clip-rule="evenodd"
                          d="M1.5655 12.9808L2.75011 8.59229H7.7578C7.89242 8.59229 8.02704 8.45767 8.02704 8.32306V7.7846C8.02704 7.64998 7.89242 7.51537 7.7578 7.51537H2.75011L1.59242 3.20767C1.5655 3.15383 1.53857 3.07306 1.53857 2.99229C1.53857 2.80383 1.72704 2.61537 1.94242 2.64229C1.99627 2.64229 2.02319 2.66921 2.07704 2.66921L14.1924 7.64998C14.354 7.70383 14.4617 7.86537 14.4617 8.0269C14.4617 8.18844 14.354 8.32306 14.2193 8.3769L2.07704 13.4923C2.02319 13.5192 1.96934 13.5192 1.9155 13.5192C1.70011 13.4923 1.53857 13.3308 1.53857 13.1154C1.53857 13.0615 1.53857 13.0346 1.5655 12.9808Z"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <aside class="sidepanel" id="sidepanel" aria-hidden="true" inert>
        <div class="browser">
          <div class="browser__chrome">
            <div class="browser__title" id="browserTitle">
              <span class="browser__title-icon" aria-hidden="true"></span>
              <span class="browser__title-text" id="browserTitleText">Workspace</span>
            </div>
            <button class="browser__iconbtn browser__fullscreen" id="browserFullscreen"
                    type="button" title="Expand to full screen"
                    aria-label="Expand panel to full screen" aria-pressed="false">
              <svg class="browser__icon browser__icon--expand"
                   viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 9V3h6"/>
                <path d="M21 9V3h-6"/>
                <path d="M3 15v6h6"/>
                <path d="M21 15v6h-6"/>
              </svg>
              <svg class="browser__icon browser__icon--collapse"
                   viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M9 3v6H3"/>
                <path d="M15 3v6h6"/>
                <path d="M9 21v-6H3"/>
                <path d="M15 21v-6h6"/>
              </svg>
            </button>
            <button class="browser__iconbtn browser__close" id="browserClose"
                    type="button" title="Close" aria-label="Close panel">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 6 6 18"/>
                <path d="m6 6 12 12"/>
              </svg>
            </button>
          </div>
          <div class="browser__viewport" id="browserViewport"></div>
        </div>
      </aside>
    </main>
  </div>

  <!-- Director's notes stack — fixed bottom-right, for quiet inline
       toasts (e.g. "Setup complete — Cockpit unlocked"). Lives outside
       the app shell so it floats over both sidenav + workspace. -->
  <div class="director-stack" id="directorStack"
       role="region" aria-live="polite"
       aria-label="System notifications"></div>

  <!-- Story registry. Only the setup chapter is loaded — the lobby and
       the other persona chapters have been retired for this build. -->
  <script src="stories/02-admin-sarah.js"></script>
  <script src="app.js"></script>
</body>
</html>
