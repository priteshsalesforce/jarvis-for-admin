<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis · Proactive ITSM</title>
  <link rel="icon" type="image/png" href="demo-v2/assets/jarvis-mark.png" />
  <!-- The canonical demo lives in /demo-v2 so the chapter stories,
       assets, and styles can stay together as one self-contained
       experience. This root page just bounces visitors there so the
       Pages URL `priteshsalesforce.github.io/jarvis-for-admin/`
       drops them straight into the demo. -->
  <meta http-equiv="refresh" content="0; url=demo-v2/" />
  <script>
    // Forward to the demo. We append `location.hash` so per-persona
    // share links (e.g. `…/#admin`, `…/#cto`) survive the redirect
    // and land Sarah/Vikram/etc. directly in their chapter. Using
    // `replace()` keeps this bouncer out of the back stack.
    window.location.replace("demo-v2/" + window.location.hash);
  </script>
  <style>
    :root { color-scheme: light dark; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #f7f9ff 0%, #eef1ff 100%);
      color: #2a3358;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      padding: 28px 32px;
      background: rgba(255, 255, 255, .82);
      border: 1px solid rgba(80, 100, 180, .14);
      border-radius: 18px;
      box-shadow: 0 24px 48px rgba(40, 60, 140, .14);
      backdrop-filter: saturate(160%) blur(18px);
    }
    .mark {
      width: 56px; height: 56px; margin-bottom: 14px;
      border-radius: 14px;
      background: linear-gradient(135deg, #2f5cff 0%, #6a4dff 50%, #a25cff 100%);
      box-shadow: 0 12px 28px rgba(122, 92, 255, .28);
    }
    h1 { margin: 0 0 6px; font-size: 20px; letter-spacing: -.01em; }
    p  { margin: 0 0 16px; font-size: 14px; color: #5a6892; line-height: 1.5; }
    a.btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 999px;
      background: #2f5cff; color: #fff; text-decoration: none;
      font-weight: 600; font-size: 14px;
      box-shadow: 0 10px 24px rgba(47, 92, 255, .28);
    }
    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(180deg, #06081a 0%, #0a1230 100%); color: #e6e9f4; }
      .card { background: rgba(20, 28, 56, .72); border-color: rgba(120, 140, 220, .18); }
      p { color: #a8b1d6; }
    }
  </style>
</head>
<body>
  <div class="card" role="status" aria-live="polite">
    <div class="mark" aria-hidden="true"></div>
    <h1>Jarvis · Proactive ITSM</h1>
    <p>Loading the demo…</p>
    <a class="btn" href="demo-v2/">Open the demo</a>
  </div>
</body>
</html>
