<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis · v3 (lean admin build)</title>
  <link rel="icon" type="image/png" href="../demo-v3/assets/jarvis-mark.png" />
  <!-- v3 bouncer. Mirrors the root /index.html bouncer so v3 has its
       own short URL: `priteshsalesforce.github.io/jarvis-for-admin/v3/`
       drops the visitor into /demo-v3/. The canonical demo (v2) keeps
       owning the root so existing per-persona share links (`#admin`,
       `#cto`, …) continue to land correctly.

       Like the root bouncer, this is JS-only because a <meta refresh>
       can't carry the URL fragment. We forward `location.search` +
       `location.hash` so demo-v3's deep-link hashes (`#cockpit`,
       `#tower`, `#horizon`, `#insight`, `#lens`) survive the hop and
       app.js can read them inside the IIFE bootstrap. -->
  <script>
    window.location.replace("../demo-v3/" + window.location.search + window.location.hash);
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=../demo-v3/" />
  </noscript>
  <style>
    :root { color-scheme: light dark; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #f7f9ff 0%, #eef1ff 100%);
      color: #2a3358;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      padding: 28px 32px;
      background: rgba(255, 255, 255, .82);
      border: 1px solid rgba(80, 100, 180, .14);
      border-radius: 18px;
      box-shadow: 0 24px 48px rgba(40, 60, 140, .14);
      backdrop-filter: saturate(160%) blur(18px);
    }
    .mark {
      width: 56px; height: 56px; margin-bottom: 14px;
      border-radius: 14px;
      background: linear-gradient(135deg, #2f5cff 0%, #6a4dff 50%, #a25cff 100%);
      box-shadow: 0 12px 28px rgba(122, 92, 255, .28);
    }
    h1 { margin: 0 0 6px; font-size: 20px; letter-spacing: -.01em; }
    p  { margin: 0 0 16px; font-size: 14px; color: #5a6892; line-height: 1.5; }
    a.btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 999px;
      background: #2f5cff; color: #fff; text-decoration: none;
      font-weight: 600; font-size: 14px;
      box-shadow: 0 10px 24px rgba(47, 92, 255, .28);
    }
    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(180deg, #06081a 0%, #0a1230 100%); color: #e6e9f4; }
      .card { background: rgba(20, 28, 56, .72); border-color: rgba(120, 140, 220, .18); }
      p { color: #a8b1d6; }
    }
  </style>
</head>
<body>
  <div class="card" role="status" aria-live="polite">
    <div class="mark" aria-hidden="true"></div>
    <h1>Jarvis · v3 lean build</h1>
    <p>Loading the admin-only experience…</p>
    <a class="btn" href="../demo-v3/">Open v3</a>
  </div>
</body>
</html>
