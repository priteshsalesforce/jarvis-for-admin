<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover lets us paint into the notch/safe-area on real iPhones -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f7ff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0f24" media="(prefers-color-scheme: dark)" />
  <!-- "Add to Home Screen" hints — the app launches full-screen on iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Jarvis HR" />
  <title>Jarvis · Onboarding Day</title>
  <link rel="icon" type="image/png" href="assets/jarvis-mark.png" />
  <link rel="apple-touch-icon" href="assets/jarvis-mark.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    // Honor the parent preview.html's theme choice if we're in an iframe.
    // Read ?theme=dark|light from the URL or the parent page's <html data-theme>.
    (function () {
      try {
        var p = new URLSearchParams(location.search);
        var t = p.get("theme");
        if (!t && window.parent && window.parent !== window) {
          var pt = window.parent.document.documentElement.getAttribute("data-theme");
          if (pt) t = pt;
        }
        if (t === "dark" || t === "light") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (_) { /* noop — running standalone */ }
    })();
  </script>
</head>
<body>
  <!-- Ambient background blobs (sits behind the app) -->
  <div class="bg-orb bg-orb--a" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--b" aria-hidden="true"></div>

  <!-- ========================================================
       APP SHELL — single screen, two views (home / chat) sliding
       horizontally. The composer + status bar + home indicator
       are siblings of the view stack, so they stay pinned.
       ======================================================== -->
  <div class="app" id="app" data-view="home">

    <!-- Faux iOS status bar (time · signal · wifi · battery).
         When the app is launched from "Add to Home Screen" the
         real OS status bar paints over this; the safe-area
         padding on .status-bar keeps both lined up. -->
    <div class="status-bar" id="statusBar">
      <span class="status-bar__time" id="statusBarTime">9:41</span>
      <span class="status-bar__icons" aria-hidden="true">
        <!-- Signal bars -->
        <svg width="18" height="10" viewBox="0 0 18 10" fill="currentColor">
          <rect x="0"  y="6" width="3" height="4" rx="0.6" opacity=".95"/>
          <rect x="5"  y="4" width="3" height="6" rx="0.6" opacity=".95"/>
          <rect x="10" y="2" width="3" height="8" rx="0.6" opacity=".95"/>
          <rect x="15" y="0" width="3" height="10" rx="0.6" opacity=".4"/>
        </svg>
        <!-- Wifi -->
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <path d="M1 4 Q7.5 -1 14 4"/>
          <path d="M3 6.5 Q7.5 3 12 6.5"/>
          <path d="M5.5 9 Q7.5 7.5 9.5 9"/>
          <circle cx="7.5" cy="10.2" r=".7" fill="currentColor" stroke="none"/>
        </svg>
        <!-- Battery -->
        <svg width="25" height="11" viewBox="0 0 25 11" fill="none">
          <rect x="0.5" y="0.5" width="22" height="10" rx="2.5" stroke="currentColor" stroke-opacity=".55"/>
          <rect x="2"   y="2"   width="17" height="7"  rx="1.5" fill="currentColor"/>
          <rect x="23"  y="3.5" width="1.5" height="4" rx=".6"  fill="currentColor" fill-opacity=".55"/>
        </svg>
      </span>
    </div>

    <!-- App bar (header). Avatar on home, back-arrow on chat. -->
    <header class="appbar" id="appbar">
      <button class="appbar__back" id="backBtn" type="button" aria-label="Back to home">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14 5l-6 6 6 6"/>
        </svg>
      </button>
      <span class="appbar__avatar" aria-hidden="true">P</span>
      <span class="appbar__titles">
        <span class="appbar__title" id="appbarTitle">Jarvis</span>
        <span class="appbar__sub"  id="appbarSub">Agentic HR Operations</span>
      </span>
      <span class="appbar__spacer"></span>
      <button class="appbar__icon-btn" type="button" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9" cy="9" r="6"/>
          <path d="m17 17-3.5-3.5"/>
        </svg>
      </button>
    </header>

    <!-- View stack — Home and Chat slide horizontally. -->
    <div class="view-stack">

      <!-- ============================ HOME VIEW ============================
           Greeting + 2×2 chiclets + 3 stacked home cards. Tapping a
           chiclet (or hitting Send in the composer) transitions to chat.
           =================================================================== -->
      <section class="view view--home" id="viewHome" aria-label="Home">
        <div class="home" id="homeBody">
          <div class="greet">
            <div class="greet__eyebrow" id="greetEyebrow">Welcome,</div>
            <h1 class="greet__name" id="greetName">Priya!</h1>
            <p class="greet__lead" id="greetLead"></p>
          </div>

          <!-- Chiclets render here (rendered by app.js from HOME_CHICLETS) -->
          <div class="chiclets" id="chiclets" role="list"></div>

          <!-- Awaiting your approval -->
          <section class="home-card">
            <header class="home-card__head">
              <span class="home-card__eyebrow">Awaiting your approval</span>
              <span class="home-card__time">4 items</span>
            </header>
            <div id="signoffsList"></div>
            <button class="home-card__more" type="button" data-chiclet-jump="approvals">
              See all 4 approvals
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor"
                   stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
                <path d="m4 2 4 4-4 4"/>
              </svg>
            </button>
          </section>

          <!-- On your radar -->
          <section class="home-card">
            <header class="home-card__head">
              <span class="home-card__eyebrow">On your radar</span>
            </header>
            <div id="trendingList"></div>
            <button class="home-card__more" type="button" data-chiclet-jump="joiners">
              See this week's joiners
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor"
                   stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
                <path d="m4 2 4 4-4 4"/>
              </svg>
            </button>
          </section>

          <!-- Worth knowing today -->
          <section class="home-card">
            <header class="home-card__head">
              <span class="home-card__eyebrow">Worth knowing today</span>
              <span class="home-card__time">8m ago</span>
            </header>
            <div id="digestList"></div>
          </section>
        </div>
      </section>

      <!-- ============================ CHAT VIEW ============================
           Scrollable bubble feed. The story engine appends bubbles,
           status lines, the approval card, the choice list, and the
           orchestrator task-list grid into #thread.
           =================================================================== -->
      <section class="view view--chat" id="viewChat" aria-label="Chat with Jarvis">
        <div class="chat">
          <div class="thread" id="thread"></div>
        </div>
      </section>
    </div>

    <!-- Composer — pinned to the bottom, both views share it. -->
    <form class="composer" id="composer" autocomplete="off" novalidate>
      <label class="composer__field">
        <span class="visually-hidden" style="position:absolute;left:-9999px;">Message Jarvis</span>
        <input class="composer__input" type="text" id="composerInput"
               placeholder="Ask Jarvis anything…"
               autocapitalize="sentences" autocorrect="on" inputmode="text" />
      </label>
      <button class="composer__send" type="submit" id="composerSend" disabled aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 9 16 3l-4 14-3-7-7-1Z"/>
        </svg>
      </button>
    </form>

    <!-- Bottom home indicator (iOS look). -->
    <div class="home-indicator" aria-hidden="true"></div>
  </div>

  <!-- Story data first, then the engine. -->
  <script src="data/priya.js"></script>
  <script src="app.js"></script>
</body>
</html>
