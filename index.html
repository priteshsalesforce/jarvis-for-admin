<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis · Proactive ITSM</title>
  <link rel="icon" type="image/png" href="assets/jarvis-mark.png" />
  <!-- Salesforce Sans is licensed; Inter (Google Fonts) is used as the public
       substitute when SF Sans isn't installed locally. Same metrics, near-
       identical glyphs — Salesforce community sites use this exact pair. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Apply saved theme before paint to avoid a flash of the wrong theme. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("jarvis-theme");
        if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <!-- Ambient background orb glow -->
  <div class="bg-orb bg-orb--a"></div>
  <div class="bg-orb bg-orb--b"></div>

  <!-- Top brand bar -->
  <header class="topbar">
    <div class="topbar__left">
      <div class="logo">
        <img class="logo__mark" src="assets/jarvis-mark.png" alt="Jarvis" />
        <div class="logo__text">
          <div class="logo__sub">Jarvis</div>
        </div>
      </div>
    </div>
    <div class="topbar__right">
      <button class="theme-toggle" id="themeToggle" type="button"
              aria-label="Switch theme" aria-pressed="false"
              title="Switch to dark theme">
        <!-- Shown on light theme: moon icon (click → switch to dark) -->
        <svg class="theme-toggle__icon theme-toggle__icon--moon"
             viewBox="0 0 24 24" width="16" height="16"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <!-- Shown on dark theme: sun icon (click → switch to light) -->
        <svg class="theme-toggle__icon theme-toggle__icon--sun"
             viewBox="0 0 24 24" width="16" height="16"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>
      <div class="status-pill">
        <span class="status-pill__dot"></span>
        <span>Jarvis online</span>
      </div>
    </div>
  </header>

  <!-- Workspace: left = chat, right = browser/visual panel -->
  <main class="workspace" id="workspace">
    <!-- LEFT: Chat stage -->
    <section class="stage" id="stage">
      <!-- Scrollable main area: hero + chat thread -->
      <div class="stage__main" id="stageMain">
        <div class="hero" id="hero">
          <div class="orb">
            <div class="orb__aura"></div>
            <img class="orb__mark" src="assets/jarvis-mark.png" alt="Jarvis" />
          </div>
          <h1 class="hero__title">Hi Admin, I'm <span class="grad">Jarvis</span>.</h1>
          <p class="hero__sub">Set up, observe, and fix things across your stack — start by installing IT Services.</p>

          <!-- Primary CTA — nothing else works until IT Services is installed -->
          <div class="cta-row" id="suggestions">
            <button class="cta-install" data-action="install-itsm">
              <span>Install IT Services</span>
            </button>
            <div class="cta-helper">Required to unlock the rest of Jarvis</div>
          </div>

          <!-- Whisper bar (FLIPs down into the dock when demo starts) -->
          <div class="whisper" id="whisper">
            <input class="whisper__input" id="whisperInput" placeholder="Ask me anything" />
            <button class="whisper__mic" type="button" title="Voice input">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 0-4 4v6a4 4 0 0 0 8 0V6a4 4 0 0 0-4-4z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v3"/></svg>
            </button>
            <button class="whisper__send" id="whisperSend" title="Send">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
            </button>
          </div>
        </div>

        <!-- Chat thread (built dynamically) -->
        <div class="thread" id="thread"></div>
      </div>

      <!-- Dock — empty until the demo starts and the whisper FLIPs down here -->
      <div class="dock" id="dock"></div>
    </section>

    <!-- RIGHT: Browser / visual side panel — always in DOM, slid off-screen via CSS
         until a story step opens it. We use `inert` to keep it out of the a11y tree
         and tab order while closed; toggling `hidden` would cause a layout snap. -->
    <aside class="sidepanel" id="sidepanel" aria-hidden="true" inert>
      <div class="browser">
        <div class="browser__chrome">
          <div class="browser__dots">
            <span></span><span></span><span></span>
          </div>
          <div class="browser__url" id="browserUrl">about:blank</div>
          <button class="browser__close" id="browserClose" title="Close">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div class="browser__viewport" id="browserViewport"></div>
      </div>
    </aside>
  </main>

  <script src="story.js"></script>
  <script src="app.js"></script>
</body>
</html>
